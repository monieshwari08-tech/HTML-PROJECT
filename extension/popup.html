<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Learning Notes Saver</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <h1>📚 YouTube Notes Saver</h1>
            <div id="videoInfo" class="video-info">
                <div id="videoTitle" class="video-title">No video detected</div>
                <div id="videoUrl" class="video-url">Please open a YouTube video</div>
            </div>
        </div>

        <!-- Current Timestamp Display -->
        <div class="timestamp-section">
            <div class="timestamp-display">
                <span class="timestamp-label">Current Time:</span>
                <span id="currentTime" class="timestamp-value">00:00</span>
            </div>
        </div>

        <!-- Note Input Section -->
        <div class="note-input-section">
            <textarea 
                id="noteInput" 
                placeholder="Enter your note here..."
                rows="3"
                maxlength="500"
            ></textarea>
            <div class="input-actions">
                <button id="saveNote" class="btn btn-primary">
                    💾 Save Note
                </button>
                <button id="clearInput" class="btn btn-secondary">
                    🗑️ Clear
                </button>
            </div>
        </div>

        <!-- Notes List Section -->
        <div class="notes-section">
            <div class="section-header">
                <h3>📝 Your Notes</h3>
                <div class="section-actions">
                    <button id="exportNotes" class="btn btn-export">
                        📤 Export
                    </button>
                    <button id="clearAllNotes" class="btn btn-danger">
                        🗑️ Clear All
                    </button>
                </div>
            </div>
            
            <!-- Search Bar -->
            <div class="search-bar">
                <input 
                    type="text" 
                    id="searchNotes" 
                    placeholder="🔍 Search notes..."
                    maxlength="100"
                />
            </div>

            <!-- Notes Container -->
            <div id="notesContainer" class="notes-container">
                <div id="noNotesMessage" class="no-notes">
                    No notes yet. Start taking notes while watching the video!
                </div>
                <div id="notesList" class="notes-list" style="display: none;">
                    <!-- Notes will be dynamically added here -->
                </div>
            </div>
        </div>

        <!-- Statistics Section -->
        <div class="stats-section">
            <div class="stat-item">
                <span class="stat-label">Total Notes:</span>
                <span id="totalNotes" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Video Duration:</span>
                <span id="videoDuration" class="stat-value">00:00</span>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-text">
                Made with ❤️ for learners
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="success-message" style="display: none;">
        <span id="successText">Note saved successfully!</span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
